name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check types and Astro files
        run: npm run check

      - name: Validate content schema
        run: npm run test:schema

      - name: Run unit tests
        run: npm test

      - name: Build static site
        run: npm run build

  browser:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Run browser and axe smoke
        run: npm run test:browser

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-evidence-${{ github.run_id }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 7
